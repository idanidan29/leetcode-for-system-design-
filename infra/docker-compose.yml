services:
  postgres:
    image: postgres:16-alpine
    container_name: sdip-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: sdip
      POSTGRES_PASSWORD: sdip
      POSTGRES_DB: sdip
    ports:
      - "5432:5432"
    volumes:
      - sdip_pg_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sdip -d sdip"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  sdip_pg_data:
